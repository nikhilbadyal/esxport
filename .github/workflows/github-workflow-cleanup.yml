name: GitHub Workflow Cleanup

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  cleanup:
    name: GitHub Cleanup
    uses: nikhilbadyal/ghactions/.github/workflows/github-workflow-cleaner.yml@973b07fd5767789b59bf9bca88911c51fb784019 # main
    secrets:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
