name: Unit Pytest & Sonar Analysis
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  tests:
    name: >-
      Pytest - Python ${{ matrix.PYTHON_VERSION }} (ES ${{ matrix.ELASTICSEARCH_VERSION }})
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        PYTHON_VERSION: ['3.10', '3.11', '3.12', '3.13', '3.14']
        ELASTICSEARCH_VERSION: ['8.17.2', '9.4.1']
    steps:
      - name: "Checkout to repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
          cache: 'pip'
          allow-prereleases: true

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements.dev.txt
          # Dynamically install the elasticsearch python client matching the tested server's major version.
          # This allows us to guarantee backward compatibility with Elasticsearch 8.x and forward compatibility with 9.x.
          if [[ "${{ matrix.ELASTICSEARCH_VERSION }}" == 8.* ]]; then
            pip install "elasticsearch>=8.0.0,<9.0.0"
          elif [[ "${{ matrix.ELASTICSEARCH_VERSION }}" == 9.* ]]; then
            pip install "elasticsearch>=9.0.0,<10.0.0"
          fi

      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      - name: "Run tests"
        uses: pavelzw/pytest-action@510c5e90c360a185039bea56ce8b3e7e51a16507 # v2.2.0
        env:
          # Pass the current matrix version of Elasticsearch down to the test bootstrap script.
          STACK_VERSION: ${{ matrix.ELASTICSEARCH_VERSION }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Test reporter
        uses: phoenix-actions/test-reporting@7317eea6e13c47348dd0bb318669485157c518d6 # v16
        if: always()
        with:
          name: EsXport tests for (Python ${{ matrix.PYTHON_VERSION }}, ES ${{ matrix.ELASTICSEARCH_VERSION }})
          path: junit.xml
          reporter: java-junit
          output-to: step-summary
          only-summary: true
          max-annotations: 0

      - name: Upload coverage report for SonarQube
        if: matrix.PYTHON_VERSION == '3.12' && matrix.ELASTICSEARCH_VERSION == '9.4.1'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: "Checkout to repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
